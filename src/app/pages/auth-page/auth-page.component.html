<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLoginMode() ? 'Se connecter' : 'S\'inscrire' }}</h2>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
      <input type="text" formControlName="username" placeholder="Nom d'utilisateur" />

      @if (!isLoginMode()) {
        <input type="email" formControlName="email" placeholder="Email" />
        @if (authForm.get('email')?.invalid && authForm.get('email')?.touched) {
          <div class="error">Email requis et valide</div>
        }
      }

      <input type="password" formControlName="password" placeholder="Mot de passe" />

      <button type="submit" [disabled]="authForm.invalid">
        {{ isLoginMode() ? 'Se connecter' : 'S\'inscrire' }}
      </button>
    </form>

    <div class="switch-links">
      @if (isLoginMode()) {
        <button class="switch-btn" type="button" (click)="goToRegister()">Pas encore de compte ? S'inscrire</button>
      } @else {
        <button class="switch-btn" type="button" (click)="goToLogin()">Déjà inscrit ? Se connecter</button>
      }
    </div>

    @if (errorMessage()) {
      <div class="error">{{ errorMessage() }}</div>
    }
  </div>
</div>
